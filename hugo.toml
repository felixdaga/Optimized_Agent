baseURL = "https://felixdaga.github.io/Optimized_Agent/"
languageCode = "en-us"
title = "Optimized Agent"
theme = "PaperMod"
pygmentsUseClasses = true
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[pagination]
  pagerSize = 10

[minify]
  disableXML = true

[params]
  env = "production"
  description = "Research on systematically optimizing AI agents for alpha generation."
  author = "Felix Daga"
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  ShowToc = true
  TocOpen = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true

  [params.homeInfoParams]
    Title = "Optimized Agent"
    Content = """
Research on **systematically optimizing AI agents for alpha generation** — framework, DJIA demonstration, and lessons on stochasticity, error amplification, and ex-ante configuration.

If this is useful, **[star this repo on GitHub](https://github.com/felixdaga/Optimized_Agent)** to save it for later. **Delorean** — the backtesting platform from the demonstration — will be open-sourced here when ready.
"""

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/felixdaga/Optimized_Agent"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "archives"
    name = "Archive"
    url = "/archives/"
    weight = 20
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 30
  [[menu.main]]
    identifier = "github"
    name = "GitHub"
    url = "https://github.com/felixdaga/Optimized_Agent"
    weight = 40

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[markup.highlight]
  noClasses = false
